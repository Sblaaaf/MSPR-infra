# Each service is built from its own cloned repository (see CLONE_ALL.md).
# Expected layout alongside this repo:
#   ../MSPR-backend-gateway/
#   ../MSPR-backend-auth/
#   ../MSPR-backend-meal/
#   ../MSPR-backend-kcal/
#   ../MSPR-backend-etl/
#   ../MSPR-backend-recommendation/
# admin/ is bundled directly inside this repo (services/admin/).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../MSPR-backend-etl/healthai_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthai"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  etl:
    build: ../MSPR-backend-etl
    ports:
      - "8002:8002"
    volumes:
      - ../MSPR-backend-etl:/app
      - ../MSPR-backend-etl/data:/app/data
      - ../MSPR-backend-etl/logs:/app/logs
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DATA_DIR=/app/data
      - ETL_CRON_HOUR=3
      - ETL_CRON_MINUTE=0
      - ETL_SCHEDULER_ENABLED=true
      - KAGGLE_USERNAME=${KAGGLE_USERNAME:-}
      - KAGGLE_KEY=${KAGGLE_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  gateway:
    build: ../MSPR-backend-gateway
    ports:
      - "8000:8000"
    volumes:
      - ../MSPR-backend-gateway:/app
    environment:
      - ENV=development
      - KCAL_SERVICE_URL=http://kcal:8001
      - MEAL_SERVICE_URL=http://meal:8003
      - AUTH_SERVICE_URL=http://auth:8004
      - ETL_SERVICE_URL=http://etl:8002
      - ADMIN_SERVICE_URL=http://admin:8005
    depends_on:
      - kcal
      - meal
      - auth
      - etl
      - admin

  frontend:
    build:
      context: ../MSPR-frontend
    command: npm run dev
    volumes:
      - ../MSPR-frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - gateway

  kcal:
    build: ../MSPR-backend-kcal
    ports:
      - "8001:8001"
    volumes:
      - ../MSPR-backend-kcal:/app
    environment:
      - ENV=development
      - KCAL_SECRET_TOKEN=${KCAL_SECRET_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
      - MEAL_SERVICE_URL=http://meal:8003
      - VISION_PROVIDER=${VISION_PROVIDER:-huggingface}
      - VISION_MODEL=${VISION_MODEL:-claude-haiku-4-5}
      - VISION_MONTHLY_CAP=${VISION_MONTHLY_CAP:-5000}
      - VISION_MAX_IMAGE_PX=${VISION_MAX_IMAGE_PX:-768}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - db

  meal:
    build: ../MSPR-backend-meal
    ports:
      - "8003:8003"
    volumes:
      - ../MSPR-backend-meal:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db

  auth:
    build: ../MSPR-backend-auth
    ports:
      - "8004:8004"
    volumes:
      - ../MSPR-backend-auth:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db

  admin:
    build: ./services/admin
    ports:
      - "8005:8005"
    volumes:
      - ./services/admin:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=recommendation_db
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  recommendation:
    build: ../MSPR-backend-recommendation
    ports:
      - "8006:8006"
    volumes:
      - ../MSPR-backend-recommendation:/app
      - ../MSPR-backend-etl/data:/app/data
      - recommendation_models:/app/models
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=recommendation_db
      - RECOMMENDATION_API_KEY=${RECOMMENDATION_API_KEY}
      - DATA_DIR=/app/data
      - MODELS_DIR=/app/models
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - MEAL_SERVICE_URL=http://meal:8003
    depends_on:
      mongodb:
        condition: service_healthy

  # ───────────────────────── Monitoring & supervision ─────────────────────────
  # Stack Prometheus (métriques) + Loki/Promtail (logs) + Grafana (dashboards).
  # Remplace Pyctuator : dashboard centralisé embarqué dans l'admin (/admin/supervision).

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      - gateway
      - auth
      - meal
      - kcal
      - etl
      - recommendation
      - admin

  loki:
    image: grafana/loki:3.1.1
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      # Port hôte 3001 (le frontend Next.js occupe 3000). Conteneur reste sur 3000.
      - "3001:3000"
    environment:
      # Identifiants admin (édition des dashboards)
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Accès anonyme en lecture seule + autorisation d'embarquer en iframe (admin frontend)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SAMESITE=disabled
      - GF_USERS_DEFAULT_THEME=light
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/healthai-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  mongodb_data:
  recommendation_models:
  prometheus_data:
  loki_data:
  grafana_data:
